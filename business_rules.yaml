# ═══════════════════════════════════════════════════════════════
#  LATTICE-AUTOMATE  |  Business Rules
# ═══════════════════════════════════════════════════════════════
#
#  This file is the "brain" of the PolicyEngine.
#  Any change here takes effect on the next restart — no code changes needed.
#  In production, this file is managed by the Compliance team.
#
#  ⚠️  IMPORTANT:
#  If the AI generates a response that violates ANY of these rules,
#  the system blocks it BEFORE it reaches the client.
# ═══════════════════════════════════════════════════════════════

policies:
  # ── Premium Limits ──────────────────────────────────────────
  # The AI cannot quote above or below these values.
  max_premium_eur: 50000.0 # Maximum quotable premium
  min_premium_eur: 50.0 # Minimum acceptable premium (if approved)

  # ── Discount Limits ─────────────────────────────────────────
  # Note: 0.15 = 15%. The PolicyEngine converts to % internally.
  max_discount: 0.15 # Maximum discount allowed (15%)
  high_risk_max_discount: 0.05 # Max discount on HIGH risk policies (5%)

  # ── Client Restrictions ─────────────────────────────────────
  min_age_insured: 18 # Minimum insurable age (years)

  # ── Non-Insurable Zones ─────────────────────────────────────
  # Regions blocked due to catastrophic risk or regulation.
  # No quote can be processed for these zones.
  restricted_regions:
    - "ZONA_CONFLICTO_1"
    - "ZONA_CATASTROFE_A"
    - "REGION_EMBARGADA_B"

  # ── Lattice-Required Fields ─────────────────────────────────
  # Lattice Privacy Proxy MUST have validated these fields before
  # the request reaches the LLM. Serves as an audit checklist.
  required_fields:
    - "SSN"
    - "EMAIL"
    - "PHONE"

# ── Guardrails Configuration ────────────────────────────────
guardrails:
  block_hallucinated_discounts: true # Block out-of-range discounts
  log_all_violations: true # Log ALL violations
  max_llm_retries: 0 # LLM retries (0 = fail-fast)
