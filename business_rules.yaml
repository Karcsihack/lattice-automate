# ═══════════════════════════════════════════════════════════════
#  LATTICE-AUTOMATE  |  Reglas de Negocio (Business Rules)
# ═══════════════════════════════════════════════════════════════
#
#  Este archivo es el "cerebro" del PolicyEngine.
#  Cualquier cambio aquí se aplica en caliente sin tocar código.
#  En producción, este archivo lo gestiona el equipo de Compliance.
#
#  ⚠️  IMPORTANTE:
#  Si la IA genera una respuesta que viola CUALQUIERA de estas
#  reglas, el sistema la bloquea ANTES de que llegue al cliente.
# ═══════════════════════════════════════════════════════════════

policies:
  # ── Límites de Prima ────────────────────────────────────────
  # La IA no puede cotizar por encima ni por debajo de estos valores.
  max_premium_eur: 50000.0 # Prima máxima cotizable
  min_premium_eur: 50.0 # Prima mínima aceptable (si aprobado)

  # ── Límites de Descuento ────────────────────────────────────
  # Nota: 0.15 = 15%. El PolicyEngine convierte a % internamente.
  max_discount: 0.15 # Descuento máximo permitido (15%)
  high_risk_max_discount: 0.05 # Descuento máx. en pólizas de riesgo ALTO (5%)

  # ── Restricciones de Cliente ────────────────────────────────
  min_age_insured: 18 # Edad mínima del asegurado (años)

  # ── Zonas No Asegurables ────────────────────────────────────
  # Regiones bloqueadas por riesgo catastrófico o regulación.
  # Ninguna cotización puede procesarse para estas zonas.
  restricted_regions:
    - "ZONA_CONFLICTO_1"
    - "ZONA_CATASTROFE_A"
    - "REGION_EMBARGADA_B"

  # ── Campos Requeridos por Lattice ───────────────────────────
  # Lattice Privacy Proxy DEBE haber validado estos campos antes
  # de que la petición llegue al LLM. Sirve como checklist de auditoría.
  required_fields:
    - "DNI"
    - "EMAIL"
    - "PHONE"

# ── Configuración de Guardrails ─────────────────────────────
guardrails:
  block_hallucinated_discounts: true # Bloquear discounts fuera de rango
  log_all_violations: true # Registrar TODAS las violaciones en log
  max_llm_retries: 0 # Reintentos al LLM (0 = fail-fast)
